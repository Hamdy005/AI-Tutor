<svg width="180" height="180" viewBox="0 0 180 180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @media (prefers-color-scheme: light) {
      .background { fill: #2563eb; }
      .foreground { fill: white; }
      .accent { fill: #fbbf24; }
    }
    @media (prefers-color-scheme: dark) {
      .background { fill: #3b82f6; }
      .foreground { fill: white; }
      .accent { fill: #fbbf24; }
    }
  </style>
  <rect class="background" width="180" height="180" rx="37" />
  <g transform="translate(90,85)">
    <!-- Graduation cap base -->
    <path class="foreground" d="M-60,10 L-55,25 L55,25 L60,10 L0,-30 Z" />
    <!-- Cap top -->
    <path class="foreground" d="M-65,12 L0,-35 L65,12" fill="none" stroke="currentColor" stroke-width="4" />
    <!-- Tassel -->
    <line x1="0" y1="-35" x2="0" y2="-50" class="accent" stroke-width="3" stroke-linecap="round" />
    <circle cx="0" cy="-53" r="4" class="accent" />
    <!-- Book below cap -->
    <rect x="-30" y="28" width="60" height="22" rx="3" class="foreground" />
    <line x1="-20" y1="32" x2="-20" y2="46" stroke="#2563eb" stroke-width="2" />
    <line x1="-10" y1="32" x2="-10" y2="46" stroke="#2563eb" stroke-width="2" />
    <line x1="0" y1="32" x2="0" y2="46" stroke="#2563eb" stroke-width="2" />
    <line x1="10" y1="32" x2="10" y2="46" stroke="#2563eb" stroke-width="2" />
    <line x1="20" y1="32" x2="20" y2="46" stroke="#2563eb" stroke-width="2" />
  </g>
</svg>
